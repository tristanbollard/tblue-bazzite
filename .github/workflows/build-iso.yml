---
name: Build ISO

on:
  workflow_dispatch:

env:
  IMAGE_NAME: "${{ github.event.repository.name }}"

jobs:
  build-iso:
    name: Build and upload ISO
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: read

    steps:
      # Free up disk space – ISOs can exceed 4 GB
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@695eb75bc387dbcd9685a8e72d23439d8686cba6 # v1

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Prepare environment
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> "${GITHUB_ENV}"

      - name: Build container image
        id: build_image
        uses: redhat-actions/buildah-build@7a95fa7ee0f02d552a32753e7414641a04307056 # v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: latest
          oci: false

      - name: Build ISO with bootc-image-builder
        # buildah stores locally built images under the "localhost/" registry prefix,
        # so the containers-storage reference below matches the image built above.
        run: |
          mkdir -p /tmp/iso-output
          sudo podman run \
            --rm \
            --privileged \
            --pull=newer \
            --security-opt label=type:unconfined_t \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            -v /tmp/iso-output:/output \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --output /output \
            containers-storage:localhost/${{ env.IMAGE_NAME }}:latest

      - name: Upload ISO artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ env.IMAGE_NAME }}-iso
          path: /tmp/iso-output/
          retention-days: 7
          if-no-files-found: error
