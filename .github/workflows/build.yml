name: Build container image
on:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches:
      - main
    paths:
      - 'Containerfile'
      - 'system_files/**'
      - 'build_files/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'Containerfile'
      - 'system_files/**'
      - 'build_files/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

env:
  IMAGE_DESC: "HyprBazzite"
  IMAGE_KEYWORDS: "bootc,ublue,universal-blue,bazzite"
  IMAGE_LOGO_URL: "https://avatars.githubusercontent.com/u/22166252?s=200&v=4"
  IMAGE_NAME: "${{ github.event.repository.name }}"
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}"
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}-${{ inputs.brand_name }}-${{ inputs.stream_name }}
  cancel-in-progress: true

jobs:
  check_base_image:
    name: Check for base image updates
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    outputs:
      base-updated: ${{ steps.check.outputs.updated }}
    steps:
      - name: Check bazzite:stable for updates
        id: check
        run: |
          BASE_DIGEST=$(skopeo inspect docker://ghcr.io/ublue-os/bazzite:stable | jq -r '.Digest')
          echo "Base image digest: $BASE_DIGEST"
          
          if skopeo inspect docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest 2>/dev/null | jq -e '.Labels."org.opencontainers.image.base.digest"' > /dev/null; then
            CURRENT_BASE=$(skopeo inspect docker://ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest | jq -r '.Labels."org.opencontainers.image.base.digest"')
            echo "Current base digest: $CURRENT_BASE"
            
            if [ "$BASE_DIGEST" != "$CURRENT_BASE" ]; then
              echo "Base image has been updated!"
              echo "updated=true" >> $GITHUB_OUTPUT
            else
              echo "Base image unchanged"
              echo "updated=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Image doesn't exist yet or no base digest label"
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

  build_push:
    name: Build and push image
    if: |
      always() && 
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'workflow_dispatch' || 
       github.event_name == 'push' || 
       github.event_name == 'pull_request' || 
       needs.check_base_image.outputs.base-updated == 'true')
    runs-on: ubuntu-24.04

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Prepare environment
        run: |
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v7

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Get base image digest
        id: base_digest
        run: |
          BASE_DIGEST=$(skopeo inspect docker://ghcr.io/ublue-os/bazzite:stable | jq -r '.Digest')
          echo "digest=${BASE_DIGEST}" >> $GITHUB_OUTPUT
          echo "Base image digest: ${BASE_DIGEST}"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.8.1

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Generate Signing Keys
        run: |
          cosign generate-key-pair
          # Store private key safely in workspace for the signing step
          mv cosign.key /tmp/cosign.key
        env:
          COSIGN_PASSWORD: ""

      - name: Image Metadata
        uses: docker/metadata-action@v6
        id: metadata
        with:
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=stable.{{date 'YYYYMMDD'}}-${{ steps.vars.outputs.sha_short }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=testing.pr${{ github.event.pull_request.number }}.{{date 'YYYYMMDD'}}-${{ steps.vars.outputs.sha_short }},enable=${{ github.event_name == 'pull_request' }}
            type=raw,value=testing,enable=${{ github.event_name == 'pull_request' }}
          labels: |
            io.artifacthub.package.readme-url=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            org.opencontainers.image.base.name=ghcr.io/ublue-os/bazzite:stable
            org.opencontainers.image.base.digest=${{ steps.base_digest.outputs.digest }}
            io.artifacthub.package.deprecated=false
            io.artifacthub.package.keywords=${{ env.IMAGE_KEYWORDS }}
            io.artifacthub.package.license=Apache-2.0
            io.artifacthub.package.logo-url=${{ env.IMAGE_LOGO_URL }}
            io.artifacthub.package.prerelease=false
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: true
          extra-args: |
            --layers=true
          build-args: |
            SHA_HEAD_SHORT=${{ steps.vars.outputs.sha_short }}
            BUILD_STAMP=${{ steps.metadata.outputs.version }}
            
      - name: Push Image to GHCR
        uses: redhat-actions/push-to-registry@v2
        id: push
        with:
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          extra-args: |
            --disable-content-trust

      - name: Log in to GHCR for Cosign
        run: echo "${{ secrets.GITHUB_TOKEN }}" | cosign login ghcr.io -u ${{ github.actor }} --password-stdin
      
      - name: Sign Images
        if: github.event_name != 'pull_request'
        run: |
          cosign sign --yes "ghcr.io/${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

      - name: Upload Public Key Artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: cosign.pub
          path: cosign.pub
          if-no-files-found: error
          retention-days: 10
