env = CLUTTER_BACKEND,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_PLUGIN_PATH,/usr/lib64/qt6/plugins:/usr/lib64/qt5/plugins
env = QT_SCALE_FACTOR,1
env = GTK_THEME,Dracula
env = QT_STYLE_OVERRIDE,
env = XCURSOR_THEME,breeze_cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = MOZ_ENABLE_WAYLAND,1
env = OZONE_PLATFORM,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = GDK_SCALE,1
env = HYPRCURSOR_THEME,breeze_cursors
env = ELECTRON_OZONE_PLATFORM_HINT,auto

xwayland {
  force_zero_scaling = true
}

env = XCOMPOSEFILE,~/.XCompose
ecosystem {
  no_update_news = true
}

# Default Applications
env = BROWSER,flatpak run io.github.zen_browser.zen
env = TERMINAL,kitty
env = EDITOR,nano
env = FILEMANAGER,thunar
env = XDG_UTILS_TERMINAL,kitty
env = XDG_UTILS_BROWSER,flatpak run io.github.zen_browser.zen
