# Hyprbazzite Configuration Overlays
# This file ensures that system-wide configurations are linked from the immutable /usr tree to /etc

# Format: Type Path Mode UID GID Age Argument
# L+ means: Create a symbolic link, and if it already exists as a file, replace it.

# Core Desktop Environment
L+ /etc/hypr - - - - /usr/lib/hyprbazzite/etc/hypr
L+ /etc/waybar - - - - /usr/lib/hyprbazzite/etc/waybar
L+ /etc/wofi - - - - /usr/lib/hyprbazzite/etc/wofi
L+ /etc/swaync - - - - /usr/lib/hyprbazzite/etc/swaync

# System Configuration Overlays
L+ /etc/polkit-1/rules.d/10-tdp-control.rules - - - - /usr/lib/hyprbazzite/etc/polkit-1/rules.d/10-tdp-control.rules
L+ /etc/polkit-1/rules.d/49-tblue-logind-hibernate.rules - - - - /usr/lib/hyprbazzite/etc/polkit-1/rules.d/49-tblue-logind-hibernate.rules
L+ /etc/sddm.conf.d/10-theme.conf - - - - /usr/lib/hyprbazzite/etc/sddm.conf.d/10-theme.conf
L+ /etc/sddm.conf.d/kde_settings.conf - - - - /usr/lib/hyprbazzite/etc/sddm.conf.d/kde_settings.conf
L+ /etc/systemd/sleep.conf.d/90-tblue-hibernate.conf - - - - /usr/lib/hyprbazzite/etc/systemd/sleep.conf.d/90-tblue-hibernate.conf
L+ /etc/udev/rules.d/60-openrgb.rules - - - - /usr/lib/hyprbazzite/etc/udev/rules.d/60-openrgb.rules
L+ /etc/fonts/conf.d/50-jetbrains-mono.conf - - - - /usr/lib/hyprbazzite/etc/fonts/conf.d/50-jetbrains-mono.conf

# XDG and App Configs
L+ /etc/xdg/mimeapps.list - - - - /usr/lib/hyprbazzite/etc/xdg/mimeapps.list